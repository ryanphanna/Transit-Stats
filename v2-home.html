<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransitStats — Your Personal Ridership Network</title>

    <!-- Open Graph -->
    <meta property="og:title" content="TransitStats — I built a thing">
    <meta property="og:description" content="Text your stop when you board, and the app logs your trip, maps your whole ridership network, and lets you ask AI questions about your commute. Built this for fun.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://transitstats-21ba4.web.app">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="TransitStats — I built a thing">
    <meta name="twitter:description" content="Text your stop when you board. The app logs the trip, maps it, and lets you ask AI questions about your commute.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/pages/v2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
</head>
<body class="v2-theme v2-split-body">
    <main class="v2-split-container">
        <!-- Left Pane: The Action Gateway -->
        <section class="v2-left-pane">
            <div class="v2-pane-content">
                <header class="v2-hero">
                    <h1 class="v2-title">Transit<span>Stats</span></h1>
                    <p class="v2-subtitle">Your transit life, mapped.</p>
                </header>

                <div id="v2-gateway-container" class="v2-auth-gateway">
                    <div class="v2-input-group">
                        <input type="tel" id="v2-phone-input" class="v2-phone-input" placeholder="(555) 000-0000" autofocus>
                        <button id="v2-btn-go" class="v2-btn-go"><i data-lucide="arrow-right"></i></button>
                    </div>
                    <p class="v2-input-hint">Enter your number to pull up your map.</p>
                </div>

                <div id="v2-success-container" class="v2-auth-success hidden">
                    <div class="v2-success-icon"><i data-lucide="check-circle"></i></div>
                    <h2 id="v2-success-title">Welcome back!</h2>
                    <p id="v2-success-msg">Resolving your ridership network...</p>
                </div>

                <div id="v2-auth-status" class="v2-status-msg hidden"></div>

                <div class="v2-features-grid">
                    <div class="v2-feature-card">
                        <div class="v2-f-icon"><i data-lucide="message-square"></i></div>
                        <div class="v2-f-text">
                            <strong>Snap to trip</strong>
                            <span>Text a stop — it figures out the rest</span>
                        </div>
                    </div>
                    <div class="v2-feature-card">
                        <div class="v2-f-icon"><i data-lucide="map"></i></div>
                        <div class="v2-f-text">
                            <strong>Your map</strong>
                            <span>Every ride, plotted</span>
                        </div>
                    </div>
                    <div class="v2-feature-card">
                        <div class="v2-f-icon"><i data-lucide="sparkles"></i></div>
                        <div class="v2-f-text">
                            <strong>Ask AI</strong>
                            <span>Query your whole history</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Right Pane: TTC-style Map Art -->
        <section class="v2-right-pane">
            <div id="v2-preview-map" class="v2-preview-map"></div>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module" src="js/v2/v2-home.js"></script>
</body>
</html>

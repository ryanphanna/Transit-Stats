<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Accuracy | TransitStats</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="styles/modals.css">
    <style>
        .stats-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }

        .stat-card {
            background: var(--bg-secondary);
            padding: 24px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 24px;
        }

        .percentage {
            font-size: 3em;
            font-weight: 800;
            color: var(--accent-electric);
        }

        .hit {
            color: #10b981;
        }

        .miss {
            color: #ef4444;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9em;
        }

        .tag {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.8em;
            background: var(--bg-tertiary);
        }
    </style>
</head>

<body class="map-forward-layout">
    <div class="stats-container">
        <h1>Silent Evaluation Dashboard</h1>
        <p style="color: var(--text-secondary); margin-bottom: 32px;">Testing the 90% accuracy goal before enabling UI
            suggestions.</p>

        <div class="stat-card" style="text-align: center;">
            <div id="accuracyPercent" class="percentage">0%</div>
            <div style="font-weight: 600; margin-top: 8px;">Total Accuracy</div>
            <div id="hitCounter" style="color: var(--text-secondary); font-size: 0.9em; margin-top: 4px;">0 hits / 0
                total</div>
        </div>

        <div class="stat-card">
            <h3>Recent Predictions</h3>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Status</th>
                            <th>Confidence</th>
                            <th>Predicted</th>
                            <th>Actual</th>
                        </tr>
                    </thead>
                    <tbody id="statsTableBody">
                        <!-- Stats go here -->
                    </tbody>
                </table>
            </div>
        </div>

        <button class="btn btn-outline" onclick="window.location.href='index.html'">Back to Dashboard</button>
    </div>

    <script type="module">
        import { db, auth } from './js/firebase.js';

        auth.onAuthStateChanged(user => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            loadStats(user.uid);
        });

        async function loadStats(userId) {
            const snapshot = await db.collection('predictionStats')
                .where('userId', '==', userId)
                .orderBy('timestamp', 'desc')
                .limit(50)
                .get();

            const stats = [];
            snapshot.forEach(doc => stats.push(doc.data()));

            if (stats.length === 0) {
                document.getElementById('statsTableBody').innerHTML = '<tr><td colspan="5">No evaluation data yet. Finish a trip to see results.</td></tr>';
                return;
            }

            const hits = stats.filter(s => s.isHit).length;
            const accuracy = Math.round((hits / stats.length) * 100);

            document.getElementById('accuracyPercent').textContent = `${accuracy}%`;
            document.getElementById('accuracyPercent').className = `percentage ${accuracy >= 90 ? 'hit' : ''}`;
            document.getElementById('hitCounter').textContent = `${hits} hits / ${stats.length} total`;

            const html = stats.map(s => `
                <tr>
                    <td>${s.timestamp?.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</td>
                    <td class="${s.isHit ? 'hit' : 'miss'}" style="font-weight: 700;">${s.isHit ? 'HIT' : 'MISS'}</td>
                    <td>${s.confidence}%</td>
                    <td>${s.predicted}</td>
                    <td>${s.actual}</td>
                </tr>
            `).join('');
            document.getElementById('statsTableBody').innerHTML = html;
        }
    </script>
</body>

</html>

name: Deploy to Firebase on merge
on:
  push:
    branches:
      - main
permissions:
  contents: read
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm install && npm run build && cd functions && npm install --omit=optional && cd ..
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      - name: Deploy Functions
        # NOTE: The service account in FIREBASE_SERVICE_ACCOUNT_TRANSITSTATS_21BA4
        # must have at minimum the following IAM roles on the project:
        #   - roles/firebase.admin   (recommended)
        #   or
        #   - roles/cloudfunctions.developer
        #   - roles/firebase.functions.developer
        #   - roles/datastore.user   (required to avoid 403 when accessing Firestore during deploy)
        #
        # The 403 error on firestore.googleapis.com during "firebase deploy --only functions"
        # is almost always caused by missing datastore.user (or broader firebase.admin) on the SA.
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_TRANSITSTATS_21BA4 }}' > /tmp/sa.json
          npm install -g firebase-tools
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json firebase deploy --only functions --project transitstats-21ba4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TRANSITSTATS_21BA4 }}
          channelId: live
          projectId: transitstats-21ba4

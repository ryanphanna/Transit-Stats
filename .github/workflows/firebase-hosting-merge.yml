name: Deploy to Firebase on merge
on:
  push:
    branches:
      - main
permissions:
  contents: read
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm install && npm run build && cd functions && npm install --omit=optional && cd ..
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      - name: Deploy Functions
        # NOTE: The service account in FIREBASE_SERVICE_ACCOUNT_TRANSITSTATS_21BA4
        # must have at minimum the following IAM roles on the project:
        #   - roles/firebase.admin   (recommended)
        #   or
        #   - roles/cloudfunctions.developer
        #   - roles/firebase.functions.developer
        #   - roles/datastore.user   (required to avoid 403 when accessing Firestore during deploy)
        #
        # The 403 error on firestore.googleapis.com during "firebase deploy --only functions"
        # is almost always caused by missing datastore.user (or broader firebase.admin) on the SA.
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_TRANSITSTATS_21BA4 }}' > /tmp/sa.json
          npm install -g firebase-tools
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json firebase deploy --only functions --project transitstats-21ba4
      - name: Deploy Hosting
        # Firebase returns 400 FAILED_PRECONDITION when the build output is
        # identical to the already-live version (e.g. only function code changed).
        # That's a false-positive failure — the site is already up to date.
        run: |
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json firebase deploy --only hosting --project transitstats-21ba4 2>&1 | tee /tmp/hosting_out.txt; EXIT=${PIPESTATUS[0]}
          if [ $EXIT -ne 0 ] && grep -q "current active version" /tmp/hosting_out.txt; then
            echo "Hosting already up to date, skipping."
            exit 0
          fi
          exit $EXIT

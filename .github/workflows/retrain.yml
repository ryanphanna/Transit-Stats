name: Weekly Model Retrain

on:
  schedule:
    - cron: '0 4 * * 1'  # Every Monday at 4 AM UTC
  workflow_dispatch:       # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r ml/requirements.txt

      - name: Write service account key
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          mkdir -p "$HOME/Desktop/Dev/Credentials"
          echo "$FIREBASE_KEY" > "$HOME/Desktop/Dev/Credentials/Firebase for Transit Stats.json"

      - name: Export trips from Firestore
        run: GRPC_DNS_RESOLVER=native python3 ml/export_trips.py

      - name: Retrain V4 + V5
        run: GRPC_DNS_RESOLVER=native python3 ml/train_endstop.py

      - name: Copy models to functions/lib
        run: |
          cp ml/model_v4_endstop.json functions/lib/model_v4_endstop.json
          cp ml/model_v4_endstop_meta.json functions/lib/model_v4_endstop_meta.json
          cp ml/model_v5_endstop.onnx functions/lib/model_v5_endstop.onnx
          cp ml/model_v5_endstop_meta.json functions/lib/model_v5_endstop_meta.json

      - name: Append retrain results to MODEL_LOG
        run: |
          python3 - <<'EOF'
          import json, datetime, pathlib

          v4 = json.loads(pathlib.Path("ml/model_v4_endstop_meta.json").read_text())
          v5 = json.loads(pathlib.Path("ml/model_v5_endstop_meta.json").read_text())
          date = datetime.date.today().isoformat()
          n = v5["n_trips"]
          v4_classes = len(v4["classes"])
          v5_classes = len(v5["classes"])

          entry = f"""
          ## Auto-retrain — {date}

          ### V5 — XGBoost End Stop

          | Field | Value |
          |---|---|
          | **Date trained** | {date} |
          | **Trip count** | {n} (after cleaning) |
          | **Top-1 accuracy** | {v5['top1_accuracy']:.1%} |
          | **Top-3 accuracy** | {v5['top3_accuracy']:.1%} |
          | **Classes** | {v5_classes} end stops |

          ### V4 — Logistic Regression End Stop

          | Field | Value |
          |---|---|
          | **Date trained** | {date} |
          | **Trip count** | {n} (after cleaning) |
          | **Top-1 accuracy** | {v4['top1_accuracy']:.1%} |
          | **Top-3 accuracy** | {v4['top3_accuracy']:.1%} |
          | **Classes** | {v4_classes} end stops |

          ---
          """

          import textwrap
          entry = textwrap.dedent(entry).lstrip("\n")

          log = pathlib.Path("ml/MODEL_LOG.md")
          content = log.read_text()
          # Insert after the header block (first ---)
          insert_at = content.index("---\n") + 4
          log.write_text(content[:insert_at] + "\n" + entry + content[insert_at:])
          print(f"Appended retrain entry for {date} to MODEL_LOG.md")
          EOF

      - name: Commit and push updated models
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            functions/lib/model_v4_endstop.json \
            functions/lib/model_v4_endstop_meta.json \
            functions/lib/model_v5_endstop.onnx \
            functions/lib/model_v5_endstop_meta.json \
            ml/model_v4_endstop.json \
            ml/model_v4_endstop_meta.json \
            ml/model_v5_endstop.onnx \
            ml/model_v5_endstop_meta.json \
            ml/MODEL_LOG.md
          git diff --cached --quiet || git commit -m "chore: weekly model retrain [skip ci]"
          git push origin main

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install function dependencies
        run: npm install --prefix functions

      - name: Deploy functions to Firebase
        run: firebase deploy --only functions --token "${{ secrets.FIREBASE_TOKEN }}"

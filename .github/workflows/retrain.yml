name: Weekly Model Retrain

on:
  schedule:
    - cron: '0 4 * * 1'  # Every Monday at 4 AM UTC
  workflow_dispatch:       # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r ml/requirements.txt

      - name: Write service account key
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          mkdir -p "$HOME/Desktop/Dev/Credentials"
          echo "$FIREBASE_KEY" > "$HOME/Desktop/Dev/Credentials/Firebase for Transit Stats.json"

      - name: Export trips from Firestore
        run: GRPC_DNS_RESOLVER=native python3 ml/export_trips.py

      - name: Retrain end-stop models (V4 + V5)
        run: GRPC_DNS_RESOLVER=native python3 ml/train_endstop.py

      - name: Retrain route models (V4 + V5)
        run: GRPC_DNS_RESOLVER=native python3 ml/train_routes.py

      - name: Copy end-stop models to functions/lib
        run: |
          cp ml/model_v4_endstop.json functions/lib/model_v4_endstop.json
          cp ml/model_v4_endstop_meta.json functions/lib/model_v4_endstop_meta.json
          cp ml/model_v5_endstop.onnx functions/lib/model_v5_endstop.onnx
          cp ml/model_v5_endstop_meta.json functions/lib/model_v5_endstop_meta.json

      - name: Append retrain results to MODEL_LOG
        run: |
          python3 - <<'EOF'
          import json, datetime, pathlib

          es_v4 = json.loads(pathlib.Path("ml/model_v4_endstop_meta.json").read_text())
          es_v5 = json.loads(pathlib.Path("ml/model_v5_endstop_meta.json").read_text())
          rt_v4 = json.loads(pathlib.Path("ml/model_v4_meta.json").read_text())
          rt_v5 = json.loads(pathlib.Path("ml/model_v5_meta.json").read_text())
          date = datetime.date.today().isoformat()

          entry_lines = [
              f"## Auto-retrain — {date}",
              "",
              "### End-Stop Models",
              "",
              "| Model | Top-1 | Top-3 | Classes | Trips |",
              "|---|---|---|---|---|",
              f"| V5 XGBoost | {es_v5['top1_accuracy']:.1%} | {es_v5['top3_accuracy']:.1%} | {len(es_v5['classes'])} | {es_v5['n_trips']} |",
              f"| V4 LogReg  | {es_v4['top1_accuracy']:.1%} | {es_v4['top3_accuracy']:.1%} | {len(es_v4['classes'])} | {es_v4['n_trips']} |",
              "",
              "### Route Models",
              "",
              "| Model | Top-1 | Top-3 | Classes | Trips |",
              "|---|---|---|---|---|",
              f"| V5 XGBoost | {rt_v5['top1_accuracy']:.1%} | {rt_v5['top3_accuracy']:.1%} | {len(rt_v5['classes'])} | {rt_v5['n_trips']} |",
              f"| V4 LogReg  | {rt_v4['top1_accuracy']:.1%} | {rt_v4['top3_accuracy']:.1%} | {len(rt_v4['classes'])} | {rt_v4['n_trips']} |",
              "",
              "---",
              "",
          ]
          entry = "\n".join(entry_lines)

          log = pathlib.Path("ml/MODEL_LOG.md")
          content = log.read_text()
          insert_at = content.index("---\n") + 4
          log.write_text(content[:insert_at] + "\n" + entry + content[insert_at:])
          print(f"Appended retrain entry for {date} to MODEL_LOG.md")
          EOF

      - name: Commit and push updated models
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            functions/lib/model_v4_endstop.json \
            functions/lib/model_v4_endstop_meta.json \
            functions/lib/model_v5_endstop.onnx \
            functions/lib/model_v5_endstop_meta.json \
            functions/lib/model_v4.json \
            functions/lib/model_v4_meta.json \
            functions/lib/model_v5.onnx \
            functions/lib/model_v5_meta.json \
            ml/model_v4_endstop.json \
            ml/model_v4_endstop_meta.json \
            ml/model_v5_endstop.onnx \
            ml/model_v5_endstop_meta.json \
            ml/model_v4.json \
            ml/model_v4_meta.json \
            ml/model_v5.onnx \
            ml/model_v5_meta.json \
            ml/MODEL_LOG.md
          git diff --cached --quiet || git commit -m "chore: weekly model retrain [skip ci]"
          git push origin main

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install function dependencies
        run: npm install --prefix functions

      - name: Deploy functions to Firebase
        run: firebase deploy --only functions --token "${{ secrets.FIREBASE_TOKEN }}"

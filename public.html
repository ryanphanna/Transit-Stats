<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransitStats — Public Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
</head>
<body>
    <main id="app-root">
        <section class="view active public-view">
            <div id="publicMap" class="full-map"></div>

            <div class="public-overlay">
                <div class="public-card profile-card">
                    <div class="profile-header">
                        <div id="userEmoji" class="brand-icon" style="margin:0; font-size: 2rem;"></div>
                        <div class="profile-info">
                            <h2 id="userName" style="margin:0; font-size: 1.25rem;">Public Profile</h2>
                            <p id="userAgency" class="text-secondary" style="margin:0; font-size: 0.8rem;"></p>
                        </div>
                    </div>
                    <div class="public-stats-grid">
                        <div class="public-stat">
                            <strong id="totalTrips">0</strong>
                            <span>Trips</span>
                        </div>
                        <div class="public-stat">
                            <strong id="totalHours">0</strong>
                            <span>Hours</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="public-branding">
                <a href="/" class="branding-link">
                    <i data-lucide="bus" class="icon-inline"></i>
                    <span>TransitStats</span>
                </a>
            </div>
        </section>
    </main>

    <script type="module" src="js/public.js"></script>
</body>
</html>

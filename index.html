<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransitStats</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <main id="app-root">
        <section id="view-auth" class="view auth-view active">
            <div class="auth-card card">
                <div class="brand-icon"><i data-lucide="bus"></i></div>
                <h1 class="auth-title">TransitStats</h1>
                <p class="auth-subtitle">Your Personal Transit Dashboard</p>

                <div id="auth-email-step">
                    <div class="form-group mb-3">
                        <input type="email" id="auth-email" class="input-center" placeholder="Enter your email address">
                    </div>
                    <button id="btn-auth-continue" class="btn btn-primary full-width btn-inactive">Continue</button>
                    <p class="auth-footer-note mt-4">Invite only.</p>
                </div>

                <div id="auth-password-step" class="hidden">
                    <div class="auth-active-user">
                        <span class="auth-label">Signing in as</span>
                        <strong id="auth-display-email" class="auth-email-text"></strong>
                    </div>

                    <div id="auth-login-options" class="auth-options mt-4">
                        <button id="btn-auth-magic" class="btn btn-primary full-width mb-3">Send Magic Link</button>
                        <button id="btn-auth-use-password" class="btn btn-outline full-width">Sign in with Password</button>
                    </div>

                    <div id="auth-password-input-group" class="hidden form-group mt-4">
                        <input type="password" id="auth-password" class="input-center" placeholder="••••••••">
                        <button id="btn-auth-forgot" class="btn btn-link full-width mt-4">Forgot Password?</button>
                        <button id="btn-auth-signin" class="btn btn-primary full-width mt-4">Sign In</button>
                    </div>

                    <div id="auth-status" class="status-msg hidden mt-4"></div>
                </div>
            </div>
            <div id="auth-map" class="auth-map-bg"></div>
        </section>
    </main>

    <script type="module" src="js/pages/login.js"></script>
</body>
</html>

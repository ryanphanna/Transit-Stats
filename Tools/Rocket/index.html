<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rocket — TransitStats Research</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../styles/main.css">
    <link rel="stylesheet" href="../../styles/rocket.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="app-root">
        <!-- Header will be injected here -->
        
        <div class="rocket-header-spacer"></div>

        <main class="research-container">
            <div id="setup-view" class="view">
                <div class="setup-card">
                    <h2>
                        <i data-lucide="rocket"></i>
                        <span>Mission Setup</span>
                    </h2>
                    
                    <div class="form-group mb-4">
                        <label>
                            <i data-lucide="map-pin"></i>
                            <span>Transit Route</span>
                        </label>
                        <input type="text" id="route-id" placeholder="e.g. 504 King" autocomplete="off">
                    </div>

                    <div class="form-group mb-4">
                        <label>
                            <i data-lucide="compass"></i>
                            <span>Service Direction</span>
                        </label>
                        <select id="route-dir">
                            <option value="">Select Direction</option>
                            <option value="Northbound">Northbound</option>
                            <option value="Southbound">Southbound</option>
                            <option value="Eastbound">Eastbound</option>
                            <option value="Westbound">Westbound</option>
                        </select>
                    </div>

                    <div class="form-group mb-4">
                        <label>
                            <i data-lucide="map"></i>
                            <span>Boarding Intersection / Stop</span>
                        </label>
                        <input type="text" id="start-stop" placeholder="Stop name or code" autocomplete="off">
                    </div>

                    <button id="btn-start" class="btn btn-primary full-width mt-2">
                        <i data-lucide="play"></i>
                        <span>START INSTRUMENT</span>
                    </button>
                </div>
                
                <div class="mt-4 text-center">
                    <p class="text-xxs text-muted">GPS telemetry required for spatial anchoring.</p>
                </div>
            </div>

            <!-- Instrument View -->
            <div class="instrument-view" id="instrument-view" style="display: none;">
                <button class="control-btn btn-doors closed" id="btn-doors">
                    <span class="btn-label">Doors Closed</span>
                    <span class="btn-value" id="val-doors">CLOSED</span>
                </button>
                <button class="control-btn btn-signal red" id="btn-signal">
                    <span class="btn-label">Red Light</span>
                    <span class="btn-value" id="val-signal">RED</span>
                </button>
                <button class="control-btn btn-motion idle motion-full" id="btn-motion">
                    <span class="btn-label">In Motion</span>
                    <span class="btn-value" id="val-motion">IDLE</span>
                </button>
            </div>
        </main>

        <div class="rocket-footer">
            <div id="end-stop-group" class="finalize-box" style="display: none;">
                <div class="form-group">
                    <label>Exit Station / Stop</label>
                    <input type="text" id="end-stop-input" placeholder="Stop name or code" autocomplete="off">
                </div>
            </div>
            <button class="main-btn btn-start" id="main-action">
                <i data-lucide="play" class="icon-inline"></i>
                <span>START RESEARCH</span>
            </button>
        </div>
    </div>

    <script type="module" src="./rocket.js"></script>
</body>
</html>

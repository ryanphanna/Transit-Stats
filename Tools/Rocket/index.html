<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rocket — TransitStats Research</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../styles/main.css">
    <link rel="stylesheet" href="../../styles/rocket.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="app-root">
        <!-- Header will be injected here -->
        
        <div class="rocket-header-spacer"></div>

        <main class="research-container">
            <!-- Setup View -->
            <div class="setup-card" id="setup-view">
                <h2><i data-lucide="rocket" class="icon-inline"></i> Mission Setup</h2>
                <div class="form-group mb-4">
                    <label>Transit Route</label>
                    <input type="text" id="route-input" placeholder="e.g. 504 King" autocomplete="off">
                </div>
                <div class="form-group mb-4">
                    <label>Service Direction</label>
                    <div class="custom-select-wrapper">
                        <select id="dir-input">
                            <option value="">Select Direction</option>
                            <option value="East">Eastbound</option>
                            <option value="West">Westbound</option>
                            <option value="North">Northbound</option>
                            <option value="South">Southbound</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Entry Station / Stop</label>
                    <input type="text" id="stop-input" placeholder="Stop name or code" autocomplete="off">
                </div>
            </div>

            <!-- Instrument View -->
            <div class="instrument-view" id="instrument-view" style="display: none;">
                <button class="control-btn btn-doors closed" id="btn-doors">
                    <span class="btn-label">Interlock</span>
                    <span class="btn-value" id="val-doors">CLOSED</span>
                </button>
                <button class="control-btn btn-signal red" id="btn-signal">
                    <span class="btn-label">Aspect</span>
                    <span class="btn-value" id="val-signal">RED</span>
                </button>
                <button class="control-btn btn-motion idle motion-full" id="btn-motion">
                    <span class="btn-label">Traction State</span>
                    <span class="btn-value" id="val-motion">IDLE</span>
                </button>
            </div>
        </main>

        <div class="rocket-footer">
            <div id="end-stop-group" class="finalize-box" style="display: none;">
                <div class="form-group">
                    <label>Exit Station / Stop</label>
                    <input type="text" id="end-stop-input" placeholder="Stop name or code" autocomplete="off">
                </div>
            </div>
            <button class="main-btn btn-start" id="main-action">
                <i data-lucide="play" class="icon-inline"></i>
                <span>START RESEARCH</span>
            </button>
        </div>
    </div>

    <script type="module" src="./rocket.js"></script>
</body>
</html>
